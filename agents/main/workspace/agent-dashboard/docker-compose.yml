version: '3.8'

services:
  # 后端 API 服务
  dashboard-api:
    build: ./backend
    container_name: agent-dashboard-api
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - WS_PORT=3001
      - DB_PATH=/app/data/dashboard.db
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./data:/app/data
    networks:
      - dashboard-network
    restart: unless-stopped

  # 前端应用
  dashboard-ui:
    build: ./frontend
    container_name: agent-dashboard-ui
    ports:
      - "8080:80"
    depends_on:
      - dashboard-api
    networks:
      - dashboard-network
    restart: unless-stopped

networks:
  dashboard-network:
    driver: bridge
